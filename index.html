<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#302b63">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="메모리 게임">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Memory Game - 메모리 게임</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Setup Screen -->
        <div id="setup-screen" class="screen active">
            <h1>🧠 메모리 게임</h1>
            <div class="setup-container">
                <div class="setup-group">
                    <label>게임 모드</label>
                    <div class="btn-group" id="mode-select">
                        <button class="btn-option selected" data-value="ai">vs 컴퓨터</button>
                        <button class="btn-option" data-value="pvp">1:1 대결</button>
                    </div>
                </div>

                <div class="setup-group" id="difficulty-group">
                    <label>난이도</label>
                    <div class="btn-group" id="difficulty-select">
                        <button class="btn-option" data-value="easy">Easy</button>
                        <button class="btn-option selected" data-value="normal">Normal</button>
                        <button class="btn-option" data-value="hard">Hard</button>
                    </div>
                </div>

                <div class="setup-group">
                    <label>카드 크기</label>
                    <div class="btn-group" id="grid-select">
                        <button class="btn-option" data-value="4">4×4</button>
                        <button class="btn-option selected" data-value="6">6×6</button>
                        <button class="btn-option" data-value="8">8×8</button>
                    </div>
                </div>

                <div class="setup-group">
                    <label>카드 테마</label>
                    <div class="btn-group" id="theme-select">
                        <button class="btn-option selected" data-value="animals">🐾 동물</button>
                        <button class="btn-option" data-value="fruits">🍎 과일</button>
                        <button class="btn-option" data-value="patterns">🔷 무늬</button>
                    </div>
                </div>

                <div class="setup-group">
                    <label>플레이어 이름</label>
                    <div class="player-name-inputs">
                        <div class="name-field">
                            <span>플레이어 1</span>
                            <input type="text" id="player1-name" value="플레이어 1" maxlength="12">
                        </div>
                        <div class="name-field" id="player2-name-field">
                            <span>플레이어 2</span>
                            <input type="text" id="player2-name" value="플레이어 2" maxlength="12">
                        </div>
                    </div>
                </div>

                <button id="start-game" class="btn-start">게임 시작</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="player-info" id="player1-info">
                    <div class="player-score-label">P1</div>
                    <div class="player-name-display" id="display-name-p1">플레이어 1</div>
                    <div class="player-score" id="score-p1">0</div>
                </div>
                <div class="game-status" id="game-status">
                    <div class="turn-indicator" id="turn-indicator">플레이어 1의 차례</div>
                    <div class="round-info" id="round-info">라운드 0 / 0</div>
                </div>
                <div class="player-info" id="player2-info">
                    <div class="player-score-label">P2</div>
                    <div class="player-name-display" id="display-name-p2">플레이어 2</div>
                    <div class="player-score" id="score-p2">0</div>
                </div>
            </div>

            <div class="game-board-container">
                <div class="game-board" id="game-board"></div>
            </div>

            <div class="game-footer">
                <button id="back-to-menu" class="btn-secondary">메뉴로</button>
                <button id="restart-game" class="btn-secondary">다시 시작</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <div class="result-container">
                <h2 id="result-title">🎉 게임 종료!</h2>
                <div id="result-content"></div>
                <div class="result-buttons">
                    <button id="play-again" class="btn-start">한판 더!</button>
                    <button id="back-to-menu-result" class="btn-secondary">메뉴로</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/themes.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/game.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
